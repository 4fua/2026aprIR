<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スコア送信フォーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>スコア送信フォーム</h1>

  <section id="infoSection">
    <h2>2026.4 はじまりIR</h2>
    <p>スコアを更新する場合、以前提出したものと同じ<strong>X ID(@のつける・つけないは統一してください)</strong>を入力し、送信してください。</p>
    <p>送信の取り消し・不具合などは、fua(Discord:m4fua)までお気軽に。</p>
  </section>

  <form id="scoreForm">
    
    <div class="form-group">
      <label for="gameSelect">機種を選択:</label>
      <select id="gameSelect" required>
        <option value="">-- 機種を選んでください --</option>
        <option value="IIDX">IIDX</option>
        <option value="SDVX">SDVX</option>
        <option value="CHUNITHM">CHUNITHM</option>
        <option value="オンゲキ">オンゲキ</option>
        <option value="maimai でらっくす">maimai でらっくす</option>
        <option value="Arcaea">Arcaea</option>
        <option value="Phigros">Phigros</option>
        <option value="プロセカ">プロセカ</option>
        <option value="ワールドダイスター 夢のステラリウム">ワールドダイスター 夢のステラリウム</option>
        <option value="Re:ステージ！プリズムステップ">Re:ステージ！プリズムステップ</option>
      </select>
    </div>

    <div class="form-group">
      <label for="songSelect">曲名を選択:</label>
      <select id="songSelect" required disabled>
        <option value="">-- まず機種を選んでください --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="difficultySelect">難易度:</label>
      <select id="difficultySelect" required disabled>
        <option value="">-- まず機種を選んでください --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="tidInput">X ID (@をつける・つけないは統一してください。ランキングには表示されません。):</label>
      <input type="text" id="tidInput" required placeholder="例: m4fua (@をつける・つけないは統一してください)">
    </div>
    
    <div class="form-group">
      <label for="nameInput">名前:</label>
      <input type="text" id="nameInput" required>
    </div>

    <div class="form-group">
      <label for="scoreInput">スコア:</label>
      <input type="number" id="scoreInput" required>
    </div>
    
    <div id="gameDescription" class="game-description" style="display: none;"></div>

    <div class="form-group">
      <label for="commentInput">ひとこと (任意):</label>
      <textarea id="commentInput" rows="3"></textarea>
    </div>

    <button type="submit" id="submitButton">送信</button>
  </form>

  <div id="statusMessage"></div>
  
  <hr>
  <section id="rankingSection">
    <h2>ランキング</h2>
    <div id="rankingContainer">
      <p>ランキングを読み込み中...</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
